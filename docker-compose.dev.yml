services:

  frontend:
    ports:
      - "5173:5173"

    volumes:
      - ./apps/frontend:/app
      - /app/node_modules

    command: npm run dev -- --host

  backend:
    ports:
      - "8000:8000"

    volumes:
      - ./apps/backend:/app

    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --reload

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"