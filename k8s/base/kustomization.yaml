apiVersion: kustomize.config.k8s.io/v1beta1

kind: Kustomization

namespace: ai-fullstack

resources:
  - namespace
  - configmap
  - secrets
  - storage
  - postgres
  - redis
  - backend
  - frontend
  - ingress

labels:
  - pairs:
      app.kubernetes.io/name: ai-fullstack
      app.kubernetes.io/managed-by: kustomize
      app.kubernetes.io/version: "1.0.0"

images:
  - name: backend
    newTag: latest

  - name: frontend
    newTag: latest