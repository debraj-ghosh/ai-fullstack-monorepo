apiVersion: kustomize.config.k8s.io/v1beta1

kind: Kustomization

namespace: ai-fullstack

resources:

  - namespace/namespace.yaml

  - configmap/backend-config.yaml

  - secrets/backend-secret.yaml

  - storage/postgres-pv.yaml
  - storage/postgres-pvc.yaml

  - postgres/
  - redis/
  - backend/
  - frontend/
  - ingress/

commonLabels:

  app.kubernetes.io/name: ai-fullstack

  app.kubernetes.io/managed-by: kustomize

  app.kubernetes.io/version: "1.0.0"

images:

  - name: backend
    newTag: latest

  - name: frontend
    newTag: latest