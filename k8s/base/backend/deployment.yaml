apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: ai-fullstack

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
        - name: backend

          image: backend

          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8000

          envFrom:
            - configMapRef:
                name: backend-config

            - secretRef:
                name: backend-secret