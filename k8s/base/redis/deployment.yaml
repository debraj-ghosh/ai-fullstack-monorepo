apiVersion: apps/v1
kind: Deployment

metadata:
  name: redis
  namespace: ai-fullstack

spec:
  replicas: 1

  selector:
    matchLabels:
      app: redis

  template:
    metadata:
      labels:
        app: redis

    spec:
      containers:

        - name: redis

          image: redis:8-alpine

          ports:
            - containerPort: 6379

          args:

            - redis-server

            - --appendonly

            - "yes"