apiVersion: networking.k8s.io/v1

kind: Ingress

metadata:
  name: ai-fullstack-ingress

  namespace: ai-fullstack

  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /

spec:

  ingressClassName: nginx

  rules:

    - host: ai-fullstack.local

      http:

        paths:

          - path: /

            pathType: Prefix

            backend:

              service:

                name: frontend

                port:

                  number: 5173

          - path: /api

            pathType: Prefix

            backend:

              service:

                name: backend

                port:

                  number: 8000