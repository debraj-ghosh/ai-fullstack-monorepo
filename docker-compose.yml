services:

  frontend:
    build:
      context: ./apps/frontend
    ports:
    - "80:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./apps/backend
    ports:
    - "8000:8000"
    depends_on:
      - postgres
      - redis
    env_file:
      - ./apps/backend/.env

  postgres:
    image: postgres:17
    container_name: postgres-db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_fullstack_db

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    container_name: redis

    command: redis-server --appendonly yes

    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: