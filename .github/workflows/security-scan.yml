name: Security Scan

on:

  push:

    branches:
      - main
      - master
      - develop

  pull_request:

    branches:
      - main
      - master
      - develop

jobs:

  analyze:

    runs-on: ubuntu-latest

    permissions:

      actions: read

      contents: read

      security-events: write

    strategy:

      matrix:

        language:

          - python

          - javascript

    steps:

      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3

        with:

          languages: ${{ matrix.language }}

      - uses: github/codeql-action/autobuild@v3

      - uses: github/codeql-action/analyze@v3