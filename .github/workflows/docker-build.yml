name: Docker Build

on:
  workflow_run:
    workflows:
      - Backend CI
      - Frontend CI

    types:
      - completed

jobs:

  docker:

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Build Backend Image
        run: |
          docker build \
          -t backend \
          ./apps/backend

      - name: Build Frontend Image
        run: |
          docker build \
          -t frontend \
          ./apps/frontend